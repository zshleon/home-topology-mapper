name: Feature request
description: Suggest an MVP-compatible enhancement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - scanning
        - device inventory
        - topology editor
        - persistence
        - Docker/LXC
        - documentation
        - other
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This does not require cloud sync, multi-user auth, SNMP deep discovery, alerting, or enterprise NMS features.
